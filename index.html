<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Apocalypse: Time & Memory</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Система времени */
        #game-time {
            font-size: 24px;
            color: #ffaa00;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
        }

        /* Контейнер для заметок */
        #notes-container {
            width: 95%;
            max-width: 500px;
            height: 80px;
            margin: 10px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            overflow-x: auto;
            padding: 5px;
        }

        .note-img {
            height: 60px;
            width: auto;
            border: 1px solid #444;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .note-img.discovered {
            opacity: 1;
        }

        /* Виджет радио */
        #viewport {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 16 / 9;
            background-image: url('img/radio.gif');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        #ui-panel {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 2px solid #222;
        }

        #freq-display {
            font-size: 38px;
            color: #ff4500;
            margin-bottom: 20px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 5px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 45px;
            width: 45px;
            border-radius: 50%;
            background: #555;
            border: 2px solid #888;
            cursor: pointer;
        }

        #overlay-start {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button {
            background: none;
            color: #ff4500;
            border: 2px solid #ff4500;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay-start">
        <button onclick="init()">ВКЛЮЧИТЬ ПИТАНИЕ</button>
    </div>

    <div id="game-time">16:00</div>

    <div id="notes-container">
        <img id="img-9112007" src="img/9112007.jpg" class="note-img">
        <img id="img-street" src="img/street.jpg" class="note-img">
        <img id="img-strictly" src="img/strictly.jpg" class="note-img">
        <img id="img-street_2" src="img/street_2.jpg" class="note-img">
    </div>

    <div id="viewport"></div>

    <div id="ui-panel">
        <div id="freq-display">88.0</div>
        <input type="range" id="tuner" min="880" max="1080" value="900">
    </div>

    <audio id="audio-noise" loop src="zvuk/zvuk-nastrojiki-radio.mp3"></audio>
    <audio id="voice-9112007" loop src="zvuk/9112007.mp3"></audio>
    <audio id="voice-street" loop src="zvuk/street.mp3"></audio>
    <audio id="voice-strictly" loop src="zvuk/strictly.mp3"></audio>
    <audio id="voice-street_2" loop src="zvuk/street_2.mp3"></audio>

    <script>
        const timeDisplay = document.getElementById('game-time');
        const tuner = document.getElementById('tuner');
        const freqDisplay = document.getElementById('freq-display');
        const noise = document.getElementById('audio-noise');
        
        // Настройки эфира
        const stations = {
            "9112007": { freq: 91.1, audio: document.getElementById('voice-9112007'), discovered: false },
            "street": { freq: 95.4, audio: document.getElementById('voice-street'), discovered: false },
            "strictly": { freq: 102.1, audio: document.getElementById('voice-strictly'), discovered: false },
            "street_2": { freq: 106.8, audio: document.getElementById('voice-street_2'), discovered: false }
        };

        let hours = 16;
        let minutes = 0;

        function init() {
            document.getElementById('overlay-start').style.display = 'none';
            noise.play();
            Object.values(stations).forEach(s => { s.audio.play(); s.audio.volume = 0; });
            
            // Запуск игрового времени
            setInterval(updateTime, 5000); // 1 минута = 5 секунд
            updateTuning();
        }

        function updateTime() {
            minutes++;
            if (minutes >= 60) {
                minutes = 0;
                hours++;
            }
            const hStr = hours < 10 ? "0"+hours : hours;
            const mStr = minutes < 10 ? "0"+minutes : minutes;
            timeDisplay.innerText = `${hStr}:${mStr}`;
        }

        function updateTuning() {
            const val = tuner.value / 10;
            freqDisplay.innerText = val.toFixed(1);
            const isLate = (hours > 16 || (hours === 16 && minutes >= 30));

            // Список активных ключей в зависимости от времени
            const activeKeys = isLate ? ["strictly", "street_2"] : ["9112007", "street"];
            const silentKeys = isLate ? ["9112007", "street"] : ["strictly", "street_2"];

            let maxStrength = 0;

            activeKeys.forEach(key => {
                const s = stations[key];
                const dist = Math.abs(val - s.freq);
                let strength = 0;
                if (dist < 0.7) {
                    strength = Math.pow(1 - (dist / 0.7), 2);
                    // Если сигнал очень четкий (>80%), открываем заметку
                    if (strength > 0.8 && !s.discovered) {
                        s.discovered = true;
                        document.getElementById('img-' + key).classList.add('discovered');
                    }
                }
                s.audio.volume = strength;
                if (strength > maxStrength) maxStrength = strength;
            });

            // Выключаем старые/будущие сигналы
            silentKeys.forEach(key => { stations[key].audio.volume = 0; });

            // Шум
            noise.volume = Math.max(0.1, 1 - (maxStrength * 0.9));
        }

        tuner.addEventListener('input', updateTuning);
        // Также проверяем тюнинг при смене времени (чтобы звук пропал/появился в 16:30)
        setInterval(updateTuning, 1000);

    </script>
</body>
</html>
